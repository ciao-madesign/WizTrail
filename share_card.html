<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WizTrail – Share Card</title>

  <link rel="stylesheet" href="wiztrail.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { background:#000; color:#fff; font-family:Inter,system-ui; }

    .share-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px;
    }

    .bottom-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .card-preview {
      background:#111;
      padding:20px;
      border-radius:18px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    #shareCard {
      width: 100%;
      max-width: 360px;
      height: 640px;
      margin: 0 auto;
      padding: 16px;
      border-radius: 20px;
      background: #000;
      box-sizing: border-box;
      overflow: hidden;
    }

    .left-col, .right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .wdi-big     { font-size:3rem; font-weight:900; line-height:1.1; }
    .wdi-comment { font-size:1.25rem; opacity:0.9; }
    .perf-comment { font-size:1rem; font-weight:600; }

    .share-data {
      font-size:0.85rem;
      opacity:0.90;
      font-weight:500;
      line-height:1.1;
    }

    #shareMap,
    #shareElev {
      width:100%;
      border-radius:12px;
      margin:14px 0;
    }

    .share-footer {
      margin-top:24px;
      padding:10px 0 4px 0;
      text-align:center;
      font-size:1rem;
      opacity:0.75;
    }

    .btn-main {
      display:inline-block;
      padding:12px 22px;
      font-size:1.2rem;
      font-weight:700;
      border:none;
      border-radius:12px;
      background:#00ffcc;
      color:#000;
      cursor:pointer;
      margin-top:18px;
    }
    .btn-main:hover { opacity:0.85; }

    #qrModal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.85);
      z-index:99999;
      justify-content:center;
      align-items:center;
    }
  </style>
</head>

<body>

<div class="share-wrapper">

  <!-- INPUT TITOLO -->
  <div style="margin-bottom:16px;">
    <label class="mini">Nome allenamento:</label>
    <input id="trainingTitleInput" type="text"
           placeholder="Allenamento"
           class="input-text"
           style="width:100%;padding:10px;font-size:1.1rem;border-radius:8px;">
  </div>

  <div class="card-preview">

    <!-- CARD -->
    <div id="shareCard">

      <!-- TITOLO -->
      <div id="shareTitle"
           style="text-align:center;font-size:1.8rem;font-weight:700;margin-bottom:18px;opacity:0.95;">
      </div>

      <!-- MAPPA -->
      <div id="shareMap" style="height:45%;border-radius:14px;"></div>

      <!-- SEZIONE INFERIORE -->
      <div class="bottom-row">

        <!-- WDI -->
        <div class="left-col">
          <div id="shareWDI" class="wdi-big"></div>
          <div id="shareComment" class="wdi-comment"></div>
          <div id="sharePerf" class="perf-comment"></div>
        </div>

        <!-- DATI + ALTIMETRIA -->
        <div class="right-col">
          <div id="sDistance" class="share-data"></div>
          <div id="sDplus"    class="share-data"></div>
          <div id="sTimeReal" class="share-data"></div>
          <div id="sTimeEst"  class="share-data" style="display:none;"></div>
          <div id="sPaceAvg"  class="share-data"></div>
          <canvas id="shareElev" width="900" height="260"></canvas>
        </div>

      </div>

      <div class="share-footer">
        Powered by <strong>WizTrail</strong> • wiztrail.app
      </div>

    </div>

    <!-- PULSANTE CONDIVISIONE -->
    <div style="display:flex;gap:12px;justify-content:center;margin-top:16px;width:100%;">
      <button id="btnStories" class="btn-main" style="width:100%;">Condividi Stories</button>
    </div>

  </div>
</div>

<!-- TORNA INDIETRO -->
<div style="text-align:center;margin-top:16px;">
  <button class="btn secondary" id="btnBack">← Torna indietro</button>
</div>

<!-- QR MODAL -->
<div id="qrModal">
  <div style="background:#111;padding:20px;border-radius:12px;text-align:center;">
    <h2 style="margin-bottom:12px;">Scansiona con il telefono</h2>
    <canvas id="qrCanvas"></canvas>
    <p style="opacity:0.7;margin-top:10px;font-size:0.9rem;">
      Usa il telefono per condividere l'immagine nelle Stories.
    </p>
    <button id="btnCloseQr"
            style="margin-top:18px;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">
      Chiudi
    </button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ------------------------------------------------------------------
     DATI DA sessionStorage
     ------------------------------------------------------------------ */
  var data = {};
  try {
    data = JSON.parse(sessionStorage.getItem('shareData') || '{}');
  } catch (e) {
    data = {};
  }

  /* ------------------------------------------------------------------
     COLORI WDI v5 — soglie sincronizzate con wiztrail-engine.js
     ------------------------------------------------------------------ */
  function wdiColor(score) {
    score = parseFloat(score);
    if (isNaN(score))  return '#2BB7DA';
    if (score <  14)   return '#2BB7DA';
    if (score <  30)   return '#34A853';
    if (score <  55)   return '#F4C20D';
    if (score < 105)   return '#F79617';
    if (score < 165)   return '#E91E63';
    return '#8E24AA';
  }

  /* ------------------------------------------------------------------
     NAVIGAZIONE
     ------------------------------------------------------------------ */
  document.getElementById('btnBack').addEventListener('click', function () {
    history.back();
  });

  document.getElementById('btnCloseQr').addEventListener('click', function () {
    document.getElementById('qrModal').style.display = 'none';
  });

  /* ------------------------------------------------------------------
     DATI TESTUALI
     ------------------------------------------------------------------ */
  var wdiScore = parseFloat(data.WDI) || 0;
  var color    = wdiColor(wdiScore);

  document.getElementById('sDistance').textContent =
    'Distanza: ' + Number(data.distance).toFixed(2) + ' km';
  document.getElementById('sDplus').textContent =
    'Dislivello: ' + Math.round(data.dplus) + ' m';

  if (data.time_real) {
    document.getElementById('sTimeReal').textContent = 'Tempo reale: ' + data.time_real;
  }

  if (data.time_est && data.includeCompare) {
    var sTimeEst = document.getElementById('sTimeEst');
    sTimeEst.style.display  = 'block';
    sTimeEst.textContent    = 'Tempo stimato: ' + data.time_est;
  }

  if (data.time_real && data.distance) {
    var parts = data.time_real.split(':').map(Number);
    if (parts.length === 3) {
      var sec  = parts[0] * 3600 + parts[1] * 60 + parts[2];
      var pace = sec / data.distance;
      document.getElementById('sPaceAvg').textContent =
        'Pace medio: ' + Math.floor(pace / 60) + ':' +
        String(Math.round(pace % 60)).padStart(2, '0') + '/km';
    }
  }

  var shareWDI = document.getElementById('shareWDI');
  shareWDI.textContent  = 'WDI ' + (data.WDI || '—');
  shareWDI.style.color  = color;

  var shareComment = document.getElementById('shareComment');
  shareComment.textContent = data.WDI_class || data.comment || '';

  // perfComment non è scritto da training-analyzer — blocco rimosso

  /* ------------------------------------------------------------------
     TITOLO
     ------------------------------------------------------------------ */
  var titleInput  = document.getElementById('trainingTitleInput');
  var shareTitle  = document.getElementById('shareTitle');
  shareTitle.textContent = 'Allenamento';

  titleInput.addEventListener('input', function () {
    var v = titleInput.value.trim();
    shareTitle.textContent = v !== '' ? v : 'Allenamento';
  });

  /* ------------------------------------------------------------------
     MAPPA LEAFLET
     ------------------------------------------------------------------ */
  var shareMapInstance = null;
  var mapReady         = false;

  function waitForTiles(map) {
    return new Promise(function (resolve) {
      var loaded = 0;
      var total  = 0;
      map.eachLayer(function (layer) {
        if (layer instanceof L.TileLayer) {
          total++;
          layer.on('load', function () {
            loaded++;
            if (loaded >= total) resolve();
          });
        }
      });
      setTimeout(resolve, 1200); // fallback rete lenta
    });
  }

  function drawLeafletMap() {
    if (!data.pts || !data.pts.length) return;

    var map = L.map('shareMap', {
      zoomControl: false,
      attributionControl: false
    });
    shareMapInstance = map;

    L.layerGroup([
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        { subdomains: 'abcd', maxZoom: 18 }),
      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
        { opacity: 0.35, maxZoom: 17 })
    ]).addTo(map);

    var latlngs  = data.pts.map(function (p) { return [p[0], p[1]]; });
    var polyline = L.polyline(latlngs, { color: color, weight: 4 }).addTo(map);
    var bounds   = polyline.getBounds();

    map.fitBounds(bounds, { padding: [20, 20] });

    setTimeout(function () {
      map.invalidateSize();
      map.fitBounds(bounds, { padding: [50, 50] });
      map.setZoom(map.getZoom() - 0.2);
    }, 100);

    waitForTiles(map).then(function () {
      mapReady = true;
    });
  }

  /* ------------------------------------------------------------------
     PROFILO ALTIMETRICO
     ------------------------------------------------------------------ */
  function drawElevProfile(elev) {
    var c   = document.getElementById('shareElev');
    var ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    if (!elev || !elev.length) return;

    var W = c.width;
    var H = c.height;

    var bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(15,15,15,0.60)');
    bg.addColorStop(1, 'rgba(20,20,20,0.40)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    var max    = Math.max.apply(null, elev);
    var min    = Math.min.apply(null, elev);
    var padTop = H * 0.25;
    var span   = (max - min) || 1;

    // area fill
    ctx.beginPath();
    for (var i = 0; i < elev.length; i++) {
      var x    = (i / (elev.length - 1)) * W;
      var norm = (elev[i] - min) / span;
      var y    = H - (norm * (H - padTop));
      if (i === 0) ctx.moveTo(x, H);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = color + '33';
    ctx.fill();

    // linea
    ctx.beginPath();
    for (var j = 0; j < elev.length; j++) {
      var xj    = (j / (elev.length - 1)) * W;
      var normj = (elev[j] - min) / span;
      var yj    = H - (normj * (H - padTop));
      j === 0 ? ctx.moveTo(xj, yj) : ctx.lineTo(xj, yj);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth   = 3;
    ctx.lineCap     = 'round';
    ctx.stroke();

    // fade laterale
    var fade = ctx.createLinearGradient(0, 0, W, 0);
    fade.addColorStop(0,    'rgba(0,0,0,0.45)');
    fade.addColorStop(0.08, 'rgba(0,0,0,0)');
    fade.addColorStop(0.92, 'rgba(0,0,0,0)');
    fade.addColorStop(1,    'rgba(0,0,0,0.45)');
    ctx.fillStyle = fade;
    ctx.fillRect(0, 0, W, H);
  }

  /* ------------------------------------------------------------------
     INIT RENDER
     ------------------------------------------------------------------ */
  setTimeout(function () {
    drawLeafletMap();
  }, 100);

  if (data.elev) drawElevProfile(data.elev);

  /* ------------------------------------------------------------------
     QR CODE
     ------------------------------------------------------------------ */
  function QR8bit(d) { this.data = d; }
  QR8bit.prototype.getLength = function () { return this.data.length; };
  QR8bit.prototype.write = function (b) {
    for (var i = 0; i < this.data.length; i++) b.put(this.data.charCodeAt(i), 8);
  };

  var QRMath_EXP = [], QRMath_LOG = [];
  for (var _i = 0; _i < 8; _i++) QRMath_EXP[_i] = 1 << _i;
  for (var _i = 8; _i < 256; _i++)
    QRMath_EXP[_i] = QRMath_EXP[_i-4] ^ QRMath_EXP[_i-5] ^ QRMath_EXP[_i-6] ^ QRMath_EXP[_i-8];
  for (var _i = 0; _i < 255; _i++) QRMath_LOG[QRMath_EXP[_i]] = _i;
  function QRMath_gexp(n) { while (n >= 256) n -= 255; return QRMath_EXP[n]; }
  function QRMath_glog(n) { return QRMath_LOG[n]; }

  function QRPolynomial(num, shift) {
    var off = 0;
    while (off < num.length && num[off] === 0) off++;
    this.num = new Array(num.length - off + shift);
    for (var i = 0; i < num.length - off; i++) this.num[i] = num[i + off];
  }
  QRPolynomial.prototype = {
    get: function (i) { return this.num[i]; },
    getLength: function () { return this.num.length; },
    multiply: function (e) {
      var n = new Array(this.getLength() + e.getLength() - 1).fill(0);
      for (var i = 0; i < this.getLength(); i++)
        for (var j = 0; j < e.getLength(); j++)
          n[i+j] ^= QRMath_gexp(QRMath_glog(this.get(i)) + QRMath_glog(e.get(j)));
      return new QRPolynomial(n, 0);
    },
    mod: function (e) {
      if (this.getLength() - e.getLength() < 0) return this;
      var ratio = QRMath_glog(this.get(0)) - QRMath_glog(e.get(0));
      var n = this.num.slice();
      for (var i = 0; i < e.getLength(); i++)
        n[i] ^= QRMath_gexp(QRMath_glog(e.get(i)) + ratio);
      return new QRPolynomial(n, 0).mod(e);
    }
  };

  function QRBitBuffer() { this.buffer = []; this.length = 0; }
  QRBitBuffer.prototype = {
    put: function (n, l) { for (var i = 0; i < l; i++) this.putBit((n >> (l - i - 1)) & 1); },
    get: function (i) { return (this.buffer[Math.floor(i / 8)] >>> (7 - i % 8)) & 1; },
    putBit: function (bit) {
      if (this.length % 8 === 0) this.buffer.push(0);
      if (bit) this.buffer[this.buffer.length - 1] |= (128 >>> (this.length % 8));
      this.length++;
    }
  };

  function QRCode(text) {
    this.moduleCount = 0;
    this.modules     = null;
    this.data        = [new QR8bit(text)];
    this.make();
  }
  QRCode.prototype = {
    make: function () {
      this.moduleCount = 21;
      this.modules = [];
      for (var r = 0; r < 21; r++) this.modules[r] = new Array(21).fill(null);
      this.setupFinder(0, 0); this.setupFinder(14, 0); this.setupFinder(0, 14);
      this.mapData(this.createData());
    },
    setupFinder: function (r, c) {
      for (var y = -1; y <= 7; y++) {
        for (var x = -1; x <= 7; x++) {
          if (r+y < 0 || r+y >= 21 || c+x < 0 || c+x >= 21) continue;
          this.modules[r+y][c+x] =
            (y >= 0 && y <= 6 && x >= 0 && x <= 6 &&
             (y === 0 || y === 6 || x === 0 || x === 6 ||
              (y >= 2 && y <= 4 && x >= 2 && x <= 4)));
        }
      }
    },
    createData: function () {
      var buf = new QRBitBuffer();
      buf.put(4, 4);
      buf.put(this.data[0].getLength(), 8);
      for (var i = 0; i < this.data[0].data.length; i++)
        buf.put(this.data[0].data.charCodeAt(i), 8);
      while (buf.length % 8 !== 0) buf.putBit(0);
      var d = new Array(19).fill(0);
      for (var j = 0; j < buf.buffer.length; j++) d[j] = buf.buffer[j];
      return d;
    },
    mapData: function (data) {
      var inc = -1, row = 20, bit = 0;
      for (var col = 20; col > 0; col -= 2) {
        if (col === 6) col--;
        for (;;) {
          for (var c = 0; c < 2; c++) {
            if (this.modules[row][col - c] === null) {
              var dark = bit < data.length * 8 &&
                         ((data[Math.floor(bit / 8)] >>> (7 - bit % 8)) & 1) === 1;
              this.modules[row][col - c] = dark;
              bit++;
            }
          }
          row += inc;
          if (row < 0 || row >= 21) { row -= inc; inc = -inc; break; }
        }
      }
    },
    draw: function (canvas, size) {
      size = size || 300;
      canvas.width = size; canvas.height = size;
      var ctx = canvas.getContext('2d');
      var b   = size / 21;
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = '#000';
      for (var r = 0; r < 21; r++)
        for (var c = 0; c < 21; c++)
          if (this.modules[r][c]) ctx.fillRect(c * b, r * b, b, b);
    }
  };

  /* ------------------------------------------------------------------
     CONDIVISIONE STORIES
     ------------------------------------------------------------------ */
  document.getElementById('btnStories').addEventListener('click', async function () {
    if (!mapReady) {
      alert('Attendi il caricamento della mappa...');
      return;
    }

    var card      = document.getElementById('shareCard');
    var oldRadius = card.style.borderRadius;
    card.style.borderRadius = '0px';

    await new Promise(function (r) { setTimeout(r, 200); });

    if (shareMapInstance) {
      var center = shareMapInstance.getCenter();
      var zoom   = shareMapInstance.getZoom();
      shareMapInstance.setView(center, zoom, { animate: false });
      shareMapInstance.invalidateSize();
      await new Promise(function (r) { setTimeout(r, 500); });
    }

    await new Promise(function (r) { requestAnimationFrame(r); });

    var canvas = await html2canvas(card, { scale: 2, useCORS: true });
    card.style.borderRadius = oldRadius;

    canvas.toBlob(async function (blob) {
      var file = new File([blob], 'wiztrail_story.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'WizTrail' });
          return;
        } catch (e) {
          return;
        }
      }

      // Fallback QR
      var dataUrl = await new Promise(function (res) {
        var r = new FileReader();
        r.onloadend = function () { res(r.result); };
        r.readAsDataURL(blob);
      });

      var qr = new QRCode(dataUrl);
      qr.draw(document.getElementById('qrCanvas'), 300);
      document.getElementById('qrModal').style.display = 'flex';
    });
  });

})();
</script>

</body>
</html>
</script>

</body>
</html>
