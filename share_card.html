<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WizTrail – Share Card</title>

<link rel="stylesheet" href="wiztrail.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  background:#000;
  color:#fff;
  margin:0;
  padding:0;
  font-family:Inter,system-ui;
}

/* ==== PREVIEW RESPONSIVA IDENTICA ALLA FINALE ==== */
.share-wrapper {
  width:100%;
  display:flex;
  justify-content:center;
  padding:20px 0;
}

.preview-container {
  width:min(100%, 360px);      /* ridotta ma proporzionata */
  aspect-ratio:9/16;           /* stessa forma della card finale */
  transform-origin: top left;
  position:relative;
}

/* ==== CARD FINALE 1080×1920 ==== */
#shareCard {
  width:1080px;
  height:1920px;

  transform:scale(calc(min(100%,360px) / 1080));

  transform-origin: top left;
  position:absolute;
  top:0; left:0;

  overflow:hidden;
  position:relative;

  /* LAYER 1 — TEXTURE PIXEL PERFECT */
  background-image:url('img/topo_texture.png');
  background-size:1080px 1920px;
  background-repeat:no-repeat;

  /* LAYER 2 — OVERLAY NERO 90% */
}
#shareCard::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.90);
  z-index:0;
}

/* ==== CONTENUTO ==== */
.share-content {
  position:absolute;
  inset:0;
  z-index:2;
  display:flex;
  flex-direction:column;
  box-sizing:border-box;
  padding:48px;
  gap:24px;
}

#shareTitle {
  text-align:center;
  font-size:2.2rem;
  font-weight:800;
  margin-bottom:12px;
  opacity:0.95;
}

/* MAPPA QUADRATA */
#shareMap {
  width:100%;
  aspect-ratio:1/1;
  background:transparent;
}

/* GRIGLIA DATI INFERIORE */
.bottom-row {
  display:flex;
  gap:20px;
  flex:1;
}

.left-col, .right-col {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.wdit-big { font-size:3.6rem; font-weight:900; }
.wdit-comment { font-size:1.6rem; }
.perf-comment { font-size:1.3rem; font-weight:600; }
.share-data { font-size:1.25rem; font-weight:600; }

/* ALTIMETRIA */
#shareElev {
  width:100%;
  height:300px;
  background:transparent;
}

/* FOOTER */
.share-footer {
  text-align:center;
  font-size:1.25rem;
  font-weight:600;
  margin-top:20px;
}

/* BOTTONI */
.btn-main {
  display:inline-block;
  padding:14px 26px;
  margin-top:24px;
  font-size:1.3rem;
  font-weight:700;
  background:#00ffcc;
  color:#000;
  border-radius:12px;
  cursor:pointer;
  border:none;
}
.btn-main:hover { opacity:0.85; }

/* QR OVERLAY */
#qrModal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:9999;
  justify-content:center;
  align-items:center;
}
</style>
</head>


<body>

<div class="share-wrapper">

  <div class="preview-container">

    <div id="shareCard">

      <div class="share-content">

        <!-- TITOLO -->
        <div id="shareTitle">Allenamento</div>

        <!-- MAPPA REALISTICA -->
        <canvas id="shareMap" width="1080" height="1080"></canvas>

        <div class="bottom-row">

          <div class="left-col">
            <div id="shareWDIT" class="wdit-big"></div>
            <div id="shareComment" class="wdit-comment"></div>
            <div id="sharePerf" class="perf-comment"></div>
          </div>

          <div class="right-col">
            <div id="sDistance" class="share-data"></div>
            <div id="sDplus" class="share-data"></div>
            <div id="sTimeReal" class="share-data"></div>
            <div id="sTimeEst" class="share-data" style="display:none;"></div>
            <div id="sPaceAvg" class="share-data"></div>

            <canvas id="shareElev" width="1080" height="300"></canvas>
          </div>

        </div>

        <div class="share-footer">
          Powered by <strong>WizTrail</strong> • wiztrail.app
        </div>

      </div> <!-- share-content -->

    </div> <!-- shareCard -->

  </div> <!-- preview-container -->

</div> <!-- wrapper -->

<div style="text-align:center;">
  <div style="max-width:360px;margin:auto;">
      <label>Nome allenamento:</label>
      <input id="trainingTitleInput" placeholder="Allenamento" 
             style="width:100%;padding:12px;font-size:1.2rem;border-radius:10px;">
      <button id="btnDownload" class="btn-main">📤 Salva</button>
      <button id="btnStories" class="btn-main" style="margin-left:10px;">📲 Stories</button>
  </div>
</div>


<div id="qrModal">
  <div style="background:#111;padding:24px;border-radius:12px;text-align:center;">
    <h2 style="margin-bottom:12px;">Scansiona con il telefono</h2>
    <canvas id="qrCanvas"></canvas>
    <p style="opacity:0.7;margin-top:10px;font-size:0.95rem;">
      Apri l’immagine sul telefono per condividerla nelle Stories.
    </p>
    <button onclick="qrModal.style.display='none'"
      style="margin-top:18px;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;background:#00ffcc;color:#000;">
      Chiudi
    </button>
  </div>
</div>


<script>
const data = JSON.parse(sessionStorage.getItem("shareData") || "{}");

function wditColor(s){
  s=Number(s);
  if(s<0.45) return "#2BB7DA";
  if(s<0.80) return "#34A853";
  if(s<1.20) return "#F4C20D";
  if(s<2.20) return "#F79617";
  if(s<8.00) return "#E91E63";
  return "#8E24AA";
}

sDistance.textContent = `Distanza: ${Number(data.distance).toFixed(2)} km`;
sDplus.textContent    = `Dislivello: ${Math.round(data.dplus)} m`;
if(data.time_real) sTimeReal.textContent = `Tempo reale: ${data.time_real}`;

if(data.time_est && data.includeCompare){
  sTimeEst.style.display="block";
  sTimeEst.textContent=`Tempo stimato: ${data.time_est}`;
}

if(data.time_real && data.distance){
  let [h,m,s]=data.time_real.split(":").map(Number);
  let sec=h*3600+m*60+s;
  let pace=sec/data.distance;
  sPaceAvg.textContent=`Pace medio: ${Math.floor(pace/60)}:${String(Math.round(pace%60)).padStart(2,"0")}/km`;
}

shareWDIT.textContent=`WDIT ${data.WDIT}`;
shareWDIT.style.color=wditColor(data.WDIT);
shareComment.textContent=data.comment||"";
if(data.includeCompare && data.perfComment){
  sharePerf.textContent=data.perfComment;
  sharePerf.style.color=wditColor(data.WDIT);
}

/* TITOLO */
trainingTitleInput.addEventListener("input", ()=>{
  const v = trainingTitleInput.value.trim();
  shareTitle.textContent = v !== "" ? v : "Allenamento";
});


/* MAPPA REALISTICA (come Training Analyzer, ma statica) */

function normalize(points){
  const lats=points.map(p=>p[0]);
  const lons=points.map(p=>p[1]);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats);
  const minLon=Math.min(...lons),maxLon=Math.max(...lons);
  const PAD=0.05;

  return points.map(p=>{
    const nx=(p[1]-minLon)/(maxLon-minLon);
    const ny=(p[0]-minLat)/(maxLat-minLat);
    return [
      PAD + nx*(1-PAD*2),
      PAD + ny*(1-PAD*2)
    ];
  });
}

function drawMap(){
  const c=shareMap;
  const ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  /* sfondo training analyzer style (leggero) */
  const g = ctx.createLinearGradient(0,0,0,c.height);
  g.addColorStop(0,"rgba(0,0,0,0.20)");
  g.addColorStop(1,"rgba(0,0,0,0.10)");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,c.width,c.height);

  /* rumore */
  const noise=document.createElement("canvas");
  noise.width=c.width;
  noise.height=c.height;
  const nctx=noise.getContext("2d");
  const img=nctx.createImageData(c.width,c.height);

  for(let i=0;i<img.data.length;i+=4){
    const v=Math.random()*35;
    img.data[i]=img.data[i+1]=img.data[i+2]=v;
    img.data[i+3]=40;
  }
  nctx.putImageData(img,0,0);
  ctx.globalAlpha=0.25;
  ctx.drawImage(noise,0,0);
  ctx.globalAlpha=1;

  if(!data.pts) return;
  const norm=normalize(data.pts);

  ctx.beginPath();
  norm.forEach((p,i)=>{
    const x=p[0]*c.width;
    const y=c.height - p[1]*c.height;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });

  ctx.strokeStyle=wditColor(data.WDIT);
  ctx.lineWidth=7;
  ctx.lineCap="round";
  ctx.stroke();
}

drawMap();


function drawElevProfile(elev){
  const c=shareElev, ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);
  if(!elev || !elev.length) return;

  const W=c.width, H=c.height;
  const max=Math.max(...elev), min=Math.min(...elev);
  const padTop=H*0.15;
  const span=(max-min)||1;
  const col=wditColor(data.WDIT);

  /* gradient background */
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"rgba(0,0,0,0.20)");
  bg.addColorStop(1,"rgba(0,0,0,0.05)");
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  /* area fill */
  ctx.beginPath();
  for(let i=0;i<elev.length;i++){
    const x=(i/(elev.length-1))*W;
    const norm=(elev[i]-min)/span;
    const y=H - norm*(H-padTop);
    if(i===0) ctx.moveTo(x,H);
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fillStyle=col+"33";
  ctx.fill();

  /* line */
  ctx.beginPath();
  for(let i=0;i<elev.length;i++){
    const x=(i/(elev.length-1))*W;
    const norm=(elev[i]-min)/span;
    const y=H - norm*(H-padTop);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=col;
  ctx.lineWidth=4;
  ctx.stroke();

  /* fade laterale */
  const fade=ctx.createLinearGradient(0,0,W,0);
  fade.addColorStop(0,"rgba(0,0,0,0.45)");
  fade.addColorStop(0.08,"rgba(0,0,0,0)");
  fade.addColorStop(0.92,"rgba(0,0,0,0)");
  fade.addColorStop(1,"rgba(0,0,0,0.45)");
  ctx.fillStyle=fade;
  ctx.fillRect(0,0,W,H);
}

if(data.elev) drawElevProfile(data.elev);


btnDownload.addEventListener("click", async ()=>{

  const card = shareCard;

  /* per l’export la riportiamo alla dimensione reale */
  card.style.transform="scale(1)";
  card.style.width="1080px";
  card.style.height="1920px";

  const canvas = await html2canvas(card,{scale:1});

  /* ripristina preview responsive */
  card.style.transform="";
  card.style.width="";
  card.style.height="";

  canvas.toBlob(blob=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="wiztrail.png";
    a.click();
  });

});


btnStories.addEventListener("click", async ()=>{

  const card=shareCard;

  /* scala reale per export */
  card.style.transform="scale(1)";
  card.style.width="1080px";
  card.style.height="1920px";

  const canvas = await html2canvas(card,{scale:1});

  /* ripristina preview */
  card.style.transform="";
  card.style.width="";
  card.style.height="";

  canvas.toBlob(async blob=>{
    const file=new File([blob],"wiztrail_story.png",{type:"image/png"});
    const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    /* MOBILE → Web Share API */
    if(isMobile &&
       navigator.share &&
       navigator.canShare &&
       navigator.canShare({files:[file]})){

      await navigator.share({
        title:"Allenamento",
        text:"Allenamento su WizTrail – Stories Mode",
        files:[file]
      });
      return;
    }

    /* DESKTOP → QR FALLBACK */
    const r=new FileReader();
    r.onloadend=()=>{
      const dataUrl=r.result;
      const qr=new QRCode(dataUrl);
      qr.draw(document.getElementById("qrCanvas"),300);
      qrModal.style.display="flex";
    };
    r.readAsDataURL(blob);
  });
});
</script>

</body>
</html>
