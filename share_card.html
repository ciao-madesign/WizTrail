<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WizTrail – Share Card</title>

<!-- css base -->
<link rel="stylesheet" href="wiztrail.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Inter,system-ui;
  margin:0;
  padding:0;
}

/* WRAPPER CENTRALE */
.share-wrapper {
  width:100%;
  display:flex;
  justify-content:center;
  padding:20px 0;
}

/* ===========================
   CARD 1080×1920 – LAYERING
   =========================== */

/* LIVELLO 0 → sfondo nero opaco 80% */
#shareCard {
  width:1080px;
  height:1920px;
  position:relative;
  overflow:hidden;
  background:rgba(0,0,0,0.80);
}

/* LIVELLO 1 → texture topo */
#shareCard::before {
  content:"";
  position:absolute;
  inset:0;

  background-image:url("img/topo_texture.png");
  background-size:cover;
  background-position:center;

  opacity:1;
  z-index:1;

  pointer-events:none; /* NON cattura click */
}

/* LIVELLO 2 → contenuti */
.share-content {
  position:absolute;
  inset:0;
  z-index:2;
  display:flex;
  flex-direction:column;
  padding:48px;
  box-sizing:border-box;
}

/* TITOLO */
#shareTitle {
  text-align:center;
  font-size:2.2rem;
  font-weight:800;
  margin-bottom:24px;
}

/* TRACCIA (1:1) */
#shareMap {
  width:100%;
  aspect-ratio:1/1;
  background:transparent;
}

/* GRID INFERIORE */
.bottom-row {
  margin-top:32px;
  display:flex;
  gap:20px;
  flex:1;
}

.left-col, .right-col {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.wdit-big { font-size:3.6rem; font-weight:900; }
.wdit-comment { font-size:1.55rem; }
.perf-comment { font-size:1.25rem; font-weight:600; }
.share-data { font-size:1.2rem; font-weight:600; }

/* ALTIMETRIA */
#shareElev {
  width:100%;
  height:300px;
  background:transparent;
}

/* FOOTER */
.share-footer {
  margin-top:40px;
  text-align:center;
  font-size:1.25rem;
  font-weight:600;
}

/* BUTTONS */
.btn-main {
  display:inline-block;
  padding:14px 26px;
  font-size:1.3rem;
  font-weight:700;
  border:none;
  border-radius:12px;
  background:#00ffcc;
  color:#000;
  cursor:pointer;
  margin-top:18px;
}
.btn-main:hover { opacity:0.85; }

/* QR MODAL */
#qrModal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:9999;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div class="share-wrapper">
  <div>

    <!-- INPUT NOME -->
    <div style="margin-bottom:16px;">
      <label>Nome allenamento:</label>
      <input id="trainingTitleInput" placeholder="Allenamento"
             style="width:100%;padding:12px;font-size:1.3rem;border-radius:10px;">
    </div>

    <!-- CARD -->
    <div id="shareCard">
      <div class="share-content">

        <div id="shareTitle">Allenamento</div>

        <!-- TRACCIA -->
        <canvas id="shareMap" width="1080" height="1080"></canvas>

        <div class="bottom-row">
          <div class="left-col">
            <div id="shareWDIT" class="wdit-big"></div>
            <div id="shareComment" class="wdit-comment"></div>
            <div id="sharePerf" class="perf-comment"></div>
          </div>

          <div class="right-col">
            <div id="sDistance" class="share-data"></div>
            <div id="sDplus"   class="share-data"></div>
            <div id="sTimeReal" class="share-data"></div>
            <div id="sTimeEst"  class="share-data" style="display:none;"></div>
            <div id="sPaceAvg"  class="share-data"></div>

            <canvas id="shareElev" width="1080" height="300"></canvas>
          </div>
        </div>

        <div class="share-footer">
          Powered by <strong>WizTrail</strong> • wiztrail.app
        </div>

      </div>
    </div>

    <!-- BUTTONS -->
    <div style="text-align:center;">
      <button id="btnDownload" class="btn-main">📤 Salva</button>
      <button id="btnStories" class="btn-main" style="margin-left:10px;">📲 Stories</button>
    </div>

  </div>
</div>

<!-- QR MODAL -->
<div id="qrModal">
  <div style="background:#111;padding:24px;border-radius:12px;text-align:center;">
    <h2>Scansiona con il telefono</h2>
    <canvas id="qrCanvas"></canvas>
    <p style="opacity:0.7;margin-top:10px;font-size:0.95rem;">
      Condividi questa immagine nelle Stories.
    </p>
    <button onclick="qrModal.style.display='none'"
      style="margin-top:18px;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">
      Chiudi
    </button>
  </div>
</div>

<script>
/* ============================================================
   LETTURA DATI
============================================================ */
const data = JSON.parse(sessionStorage.getItem("shareData") || "{}");

function wditColor(s){
  s=Number(s);
  if(s<0.45) return "#2BB7DA";
  if(s<0.80) return "#34A853";
  if(s<1.20) return "#F4C20D";
  if(s<2.20) return "#F79617";
  if(s<8.00) return "#E91E63";
  return "#8E24AA";
}

/* RIEMPIMENTO TESTI */
sDistance.textContent = `Distanza: ${Number(data.distance).toFixed(2)} km`;
sDplus.textContent    = `Dislivello: ${Math.round(data.dplus)} m`;

if(data.time_real)
  sTimeReal.textContent = `Tempo reale: ${data.time_real}`;

if(data.time_est && data.includeCompare){
  sTimeEst.style.display="block";
  sTimeEst.textContent = `Tempo stimato: ${data.time_est}`;
}

if(data.time_real && data.distance){
  let [h,m,s] = data.time_real.split(":").map(Number);
  let sec=h*3600+m*60+s;
  let pace=sec/data.distance;
  sPaceAvg.textContent =
    `Pace medio: ${Math.floor(pace/60)}:${String(Math.round(pace%60)).padStart(2,"0")}/km`;
}

shareWDIT.textContent = `WDIT ${data.WDIT}`;
shareWDIT.style.color = wditColor(data.WDIT);
shareComment.textContent = data.comment || "";

if(data.includeCompare && data.perfComment){
  sharePerf.textContent = data.perfComment;
  sharePerf.style.color = wditColor(data.WDIT);
}

/* TITOLO LIVE */
trainingTitleInput.addEventListener("input",()=>{
  shareTitle.textContent = trainingTitleInput.value.trim() || "Allenamento";
});

/* ============================================================
   TRACCIA (canvas) — SENZA MAPPA
============================================================ */
function normalize(points){
  const lats=points.map(p=>p[0]);
  const lons=points.map(p=>p[1]);
  const minLat=Math.min(...lats), maxLat=Math.max(...lats);
  const minLon=Math.min(...lons), maxLon=Math.max(...lons);
  const PAD=0.08;

  return points.map(p=>{
    const nx=(p[1]-minLon)/(maxLon-minLon);
    const ny=(p[0]-minLat)/(maxLat-minLat);
    return [
      PAD + nx*(1-PAD*2),
      PAD + ny*(1-PAD*2)
    ];
  });
}

function drawMap(){
  const c=shareMap, ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);
  if(!data.pts) return;

  const norm=normalize(data.pts);

  ctx.beginPath();
  norm.forEach((p,i)=>{
    const x=p[0]*c.width;
    const y=c.height-p[1]*c.height;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });

  ctx.strokeStyle=wditColor(data.WDIT);
  ctx.lineWidth=6;
  ctx.lineCap="round";
  ctx.stroke();
}

drawMap();

/* ============================================================
   ALTIMETRIA
============================================================ */
function drawElevProfile(elev){
  const c=shareElev, ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);
  if(!elev || !elev.length) return;

  const W=c.width;
  const H=c.height;
  const max=Math.max(...elev);
  const min=Math.min(...elev);
  const span=(max-min)||1;
  const padTop=H*0.12;
  const col=wditColor(data.WDIT);

  ctx.beginPath();
  for(let i=0;i<elev.length;i++){
    const x=(i/(elev.length-1))*W;
    const y=H - ((elev[i]-min)/span)*(H-padTop);
    if(i===0) ctx.moveTo(x,H);
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fillStyle=col+"33";
  ctx.fill();

  ctx.beginPath();
  for(let i=0;i<elev.length;i++){
    const x=(i/(elev.length-1))*W;
    const y=H - ((elev[i]-min)/span)*(H-padTop);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=col;
  ctx.lineWidth=3;
  ctx.stroke();
}

if(data.elev) drawElevProfile(data.elev);

/* ============================================================
   DOWNLOAD
============================================================ */
btnDownload.addEventListener("click", async ()=>{
  const canvas = await html2canvas(shareCard,{scale:1});
  canvas.toBlob(blob=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="wiztrail.png";
    a.click();
  });
});

/* ============================================================
   SHARE (mobile) + QR fallback
============================================================ */
btnStories.addEventListener("click", async ()=>{

  const canvas = await html2canvas(shareCard,{scale:1});

  canvas.toBlob(async blob=>{
    const file=new File([blob],"wiztrail_story.png",{type:"image/png"});
    const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile && navigator.share){
      try{
        await navigator.share({
          title:"Allenamento",
          text:"Allenamento su WizTrail – Stories Mode",
          files:[file]
        });
        return;
      }catch(e){}
    }

    const reader=new FileReader();
    reader.onloadend=()=>{
      const dataUrl=reader.result;
      const qr=new QRCode(dataUrl);
      qr.draw(document.getElementById("qrCanvas"),300);
      qrModal.style.display="flex";
    };
    reader.readAsDataURL(blob);
  });

});
</script>

</body>
</html>
