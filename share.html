<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WizTrail – Share Card</title>

<link rel="stylesheet" href="wiztrail.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { background:#000; color:#fff; font-family:system-ui; }
.wrap { max-width:900px; margin:20px auto; }
.card { margin-top:20px; text-align:center; }
#map { width:100%; height:300px; border-radius:12px; margin-top:12px; }
#elev { width:100%; height:200px; border-radius:12px; margin-top:16px; }
.wdit-big { font-size:2.6rem; font-weight:900; margin-top:16px; }
</style>
</head>

<body data-theme="dark">
<div class="wrap">

<h1>WizTrail — Share Card</h1>

<div id="card" class="card">
  <h2 id="title">Attività</h2>

  <div id="map"></div>
  <canvas id="elev"></canvas>

  <div id="wditVal" class="wdit-big"></div>
  <div id="wditClass" style="font-size:1.3rem;margin-top:8px"></div>

  <button id="btnShare" class="btn" style="margin-top:20px;">Condividi</button>
</div>

</div>

<script src="wiztrail-wdit.js"></script>

<script>
/* ------------------------------------------------------------
   1) DETECT MODE
------------------------------------------------------------ */
const params = new URLSearchParams(location.search);
const source = params.get("source");   // "gpx" oppure "strava"
const stravaId = params.get("id");

/* ------------------------------------------------------------
   2) LOAD APPROPRIATE DATA SOURCE
------------------------------------------------------------ */
async function loadData() {
  if (source === "gpx") {
    return loadFromGPX();
  }
  if (source === "strava") {
    return loadFromStrava(stravaId);
  }
  alert("Errore: sorgente non riconosciuta.");
}

/* ------------------------------------------------------------
   3) MODE: GPX (Training Analyzer)
------------------------------------------------------------ */
function loadFromGPX() {
  const data = JSON.parse(sessionStorage.getItem("shareData") || "{}");

  if (!data.pts || !data.elev) {
    alert("Dati GPX mancanti.");
    return null;
  }

  return {
    title: "Allenamento",
    pts: data.pts,
    elev: data.elev,
    wdit: parseFloat(data.WDIT),
    wditClass: data.comment || ""
  };
}

/* ------------------------------------------------------------
   4) MODE: STRAVA
------------------------------------------------------------ */
async function loadFromStrava(activityId) {
  const token = localStorage.getItem("strava_token");

  if (!token) {
    alert("Non sei autenticato con Strava.");
    return null;
  }

  try {
    const res = await fetch(`/api/strava/activity?id=${activityId}`, {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    const streams = await res.json();

    const pts = streams.latlng.data.map(([lat, lon], i) => [
      lat,
      lon,
      streams.altitude.data[i]
    ]);

    const elev = streams.altitude.data;

    const gain = elev.reduce((s, v, i) =>
      i > 0 ? s + Math.max(0, v - elev[i - 1]) : 0
    , 0);

    const metrics = {
      e: elev,
      d: streams.distance.data,
      km: streams.distance.data.at(-1) / 1000,
      gain
    };

    const resW = WizTrailWDIT.computeFromGpx(pts, metrics);

    return {
      title: "Attività Strava",
      pts,
      elev,
      wdit: resW.WDIT,
      wditClass: resW.class
    };

  } catch (err) {
    alert("Errore caricamento attività.");
    return null;
  }
}

/* ------------------------------------------------------------
   5) RENDER MAPPA
------------------------------------------------------------ */
function drawMap(pts) {
  const map = L.map("map");
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    { subdomains:"abcd", maxZoom:19 }
  ).addTo(map);

  const poly = L.polyline(pts.map(p=>[p[0],p[1]]), { color:"#4fd1c5", weight:4 }).addTo(map);

  map.fitBounds(poly.getBounds());
}

/* ------------------------------------------------------------
   6) RENDER ALTIMETRIA
------------------------------------------------------------ */
function drawElevation(canvas, elev) {
  const ctx = canvas.getContext("2d");
  const H = canvas.height, W = canvas.width;
  const max = Math.max(...elev), min = Math.min(...elev);

  ctx.clearRect(0,0,W,H);
  ctx.beginPath();

  elev.forEach((e,i)=>{
    const x = (i/(elev.length-1))*W;
    const y = H - ((e-min)/(max-min))*H;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });

  ctx.strokeStyle = "#ff00a8";
  ctx.lineWidth = 2;
  ctx.stroke();
}

/* ------------------------------------------------------------
   7) RENDER CARD
------------------------------------------------------------ */
async function render() {
  const data = await loadData();
  if (!data) return;

  title.textContent = data.title;
  wditVal.textContent = data.wdit.toFixed(2);
  wditClass.textContent = data.wditClass;

  drawMap(data.pts);

  setTimeout(()=>{
    elev.width = elev.clientWidth;
    elev.height = elev.clientHeight;
    drawElevation(elev, data.elev);
  }, 100);

  /* SHARE BUTTON */
  btnShare.onclick = async () => {
    const card = document.getElementById("card");
    const canvas = await html2canvas(card, { scale:2 });

    canvas.toBlob(blob=>{
      const file = new File([blob], "wiztrail.png", { type:"image/png" });

      if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
        navigator.share({ files:[file], title:"WizTrail" });
      } else {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "wiztrail.png";
        a.click();
      }
    });
  };
}

render();
</script>
</body>
</html>
