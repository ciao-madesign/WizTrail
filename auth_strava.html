<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Autenticazione Strava → WizTrail</title>
</head>
<body style="font-family:system-ui;padding:20px;">

<h2>Connessione a Strava…</h2>

<script>
// 1) Estrae ?code= dalla URL
const params = new URLSearchParams(location.search);
const code = params.get("code");
if (!code) {
  document.body.innerHTML += "<p>Errore: parametro code mancante.</p>";
}

// 2) Scambia CODE → ACCESS TOKEN
async function exchange() {
  const res = await fetch("https://www.strava.com/api/v3/oauth/token", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      client_id: "219532",
      client_secret: "4986d5ed06edd33fef201a2eb9a566d2febe6138",
      code,
      grant_type: "authorization_code"
    })
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem("strava_token", data.access_token);
    location.href = "import_strava.html";
  } else {
    document.body.innerHTML += "<p>Errore autentificazione.</p>";
  }
}

exchange();
</script>

</body>
</html>
