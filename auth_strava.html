<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Autenticazione Strava → WizTrail</title>
  <link rel="stylesheet" href="wiztrail.css">
  <meta name="theme-color" content="#002b2b">
</head>
<body data-theme="dark" style="font-family:system-ui;padding:40px 20px;text-align:center;">

  <p id="status">Connessione a Strava in corso…</p>

  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const code   = params.get('code');
      const status = document.getElementById('status');

      // Nessun code → redirect silenzioso
      if (!code) {
        status.textContent = 'Parametro mancante. Reindirizzamento…';
        setTimeout(() => { location.href = 'training-analyzer.html'; }, 1500);
        return;
      }

      try {
        const res  = await fetch('/api/strava/callback?code=' + encodeURIComponent(code));
        const data = await res.json();

        if (!res.ok || !data.access_token) {
          status.textContent = 'Autenticazione non riuscita. Reindirizzamento…';
          setTimeout(() => { location.href = 'training-analyzer.html'; }, 2000);
          return;
        }

        // Salva token e vai all'import
        sessionStorage.setItem('strava_token', data.access_token);
        if (data.athlete_id) {
          sessionStorage.setItem('strava_athlete_id', String(data.athlete_id));
        }

        location.href = 'import_strava.html';

      } catch (err) {
        status.textContent = 'Errore di rete. Reindirizzamento…';
        setTimeout(() => { location.href = 'training-analyzer.html'; }, 2000);
      }
    })();
  </script>

</body>
</html>
