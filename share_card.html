<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WizTrail – Share Card</title>

<link rel="stylesheet" href="wiztrail.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { background:#000; color:#fff; font-family:Inter,system-ui; }

.share-wrapper {
  max-width:900px;
  margin:0 auto 40px auto;
  padding:20px;
}

.card-preview {
  background:#111;
  padding:20px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* CARD PRINCIPALE */
#shareCard {
  width:100%;
  padding:40px 28px 60px 28px;
  background: rgba(0, 0, 0, 0.90);
  backdrop-filter: blur(12px) saturate(120%);
  -webkit-backdrop-filter: blur(12px) saturate(120%);
  border:1px solid rgba(255,255,255,0.05);
  color:#fff;
  box-shadow:0 0 30px rgba(0,0,0,0.45);
}

/* GRIGLIA */
.bottom-row {
  margin-top:28px;
  display:flex;
  gap:18px;
}

.left-col, .right-col {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* TIPOGRAFIA */
.wdit-big { font-size:3rem; font-weight:900; line-height:1.1; }
.wdit-comment { font-size:1.25rem; opacity:0.9; }
.perf-comment { font-size:1rem; font-weight:600; }

.share-data {
  font-size:0.95rem;
  opacity:0.90;
  font-weight:500;
  line-height:1.2;
}

/* CANVAS */
#shareMap,
#shareElev {
  width:100%;
  border-radius:12px;
  margin:14px 0;
}

/* FOOTER */
.share-footer {
  margin-top:36px;
  padding:12px 0 4px 0;
  text-align:center;
  font-size:1.1rem;
  opacity:0.75;
}

/* BOTTONI */
.btn-main {
  display:inline-block;
  padding:12px 22px;
  font-size:1.2rem;
  font-weight:700;
  border:none;
  border-radius:12px;
  background:#00ffcc;
  color:#000;
  cursor:pointer;
  margin-top:18px;
}
.btn-main:hover { opacity:0.85; }

/* QR OVERLAY */
#qrModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  z-index:99999;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div class="share-wrapper">

<!-- INPUT TITOLO -->
<div style="margin-bottom:16px;">
  <label class="mini">Nome allenamento:</label>
  <input id="trainingTitleInput" type="text"
         placeholder="Allenamento"
         class="input-text"
         style="width:100%;padding:10px;font-size:1.1rem;border-radius:8px;">
</div>

  <div class="card-preview">

    <!-- CARD -->
    <div id="shareCard">

      <!-- TITOLO -->
      <div id="shareTitle"
           style="text-align:center;font-size:1.8rem;font-weight:700;margin-bottom:18px;opacity:0.95;">
      </div>

      <!-- MAPPA QUADRATA -->
      <canvas id="shareMap" width="900" height="600"></canvas>

      <!-- SEZIONE INFERIORE -->
      <div class="bottom-row">

        <!-- WDIT -->
        <div class="left-col">
          <div id="shareWDIT" class="wdit-big"></div>
          <div id="shareComment" class="wdit-comment"></div>
          <div id="sharePerf" class="perf-comment"></div>
        </div>

        <!-- DATI + ALTIMETRIA -->
        <div class="right-col">
          <div id="sDistance" class="share-data"></div>
          <div id="sDplus" class="share-data"></div>
          <div id="sTimeReal" class="share-data"></div>
          <div id="sTimeEst" class="share-data" style="display:none;"></div>
          <div id="sPaceAvg" class="share-data"></div>

          <canvas id="shareElev" width="900" height="260"></canvas>
        </div>
      </div>

      <div class="share-footer">
        Powered by <strong>WizTrail</strong> • wiztrail.app
      </div>

    </div>

    <!-- BOTTONI -->
    <div style="text-align:center;">
      <button id="btnDownload" class="btn-main">📤 Salva</button>
      <button id="btnStories" class="btn-main" style="margin-left:10px;">📲 Stories</button>
    </div>

  </div>
</div>


<!-- QR MODAL -->
<div id="qrModal">
  <div style="background:#111; padding:20px; border-radius:12px; text-align:center;">
    <h2 style="margin-bottom:12px;">Scansiona con il telefono</h2>
    <canvas id="qrCanvas"></canvas>
    <p style="opacity:0.7; margin-top:10px; font-size:0.9rem;">
      Usa il telefono per condividere l’immagine nelle Stories.
    </p>
    <button onclick="qrModal.style.display='none'"
            style="margin-top:18px; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">
      Chiudi
    </button>
  </div>
</div>
<!-- TORNA AL TRAINING ANALYZER -->
<div style="text-align:center; margin-top:16px;">
  <button class="btn secondary" onclick Training Analyzer
  </button>
</div>



<script>
// =====================================================
// LETTURA DATI
// =====================================================
const data = JSON.parse(sessionStorage.getItem("shareData") || "{}");

function wditColor(score){
  score = parseFloat(score);
  if(score < 0.45) return "#2BB7DA";
  if(score < 0.80) return "#34A853";
  if(score < 1.20) return "#F4C20D";
  if(score < 2.20) return "#F79617";
  if(score < 8.00) return "#E91E63";
  return "#8E24AA";
}

sDistance.textContent = `Distanza: ${Number(data.distance).toFixed(2)} km`;
sDplus.textContent = `Dislivello: ${Math.round(data.dplus)} m`;

if(data.time_real) sTimeReal.textContent = `Tempo reale: ${data.time_real}`;

if(data.time_est && data.includeCompare){
  sTimeEst.style.display = "block";
  sTimeEst.textContent = `Tempo stimato: ${data.time_est}`;
}

if(data.time_real && data.distance){
  const [h,m,s] = data.time_real.split(":").map(Number);
  const sec = h*3600 + m*60 + s;
  const pace = sec / data.distance;
  sPaceAvg.textContent = `Pace medio: ${Math.floor(pace/60)}:${String(Math.round(pace%60)).padStart(2,"0")}/km`;
}

shareWDIT.textContent = `WDIT ${data.WDIT}`;
shareWDIT.style.color = wditColor(data.WDIT);
shareComment.textContent = data.comment || "";
if(data.includeCompare && data.perfComment){
  sharePerf.textContent = data.perfComment;
  sharePerf.style.color = wditColor(data.WDIT);
}

// TITOLO
const titleInput = document.getElementById("trainingTitleInput");
const shareTitle = document.getElementById("shareTitle");

shareTitle.textContent = "Allenamento";

titleInput.addEventListener("input", () => {
  const v = titleInput.value.trim();
  shareTitle.textContent = v !== "" ? v : "Allenamento";
});


// =====================================================
// NORMALIZZAZIONE
// =====================================================
function normalize(points){
  const lats = points.map(p=>p[0]);
  const lons = points.map(p=>p[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const PAD = 0.08;
  return points.map(p=>{
    const nx = (p[1]-minLon)/(maxLon-minLon);
    const ny = (p[0]-minLat)/(maxLat-minLat);
    return [
      PAD + nx*(1-PAD*2),
      PAD + ny*(1-PAD*2)
    ];
  });
}


// =====================================================
// MAPPA
// =====================================================
function drawMap(){
  const c = shareMap;
  const ctx = c.getContext("2d");

  const g = ctx.createLinearGradient(0,0,0,c.height);
  g.addColorStop(0,"rgba(15,15,15,0.60)");
  g.addColorStop(1,"rgba(20,20,20,0.40)");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,c.width,c.height);

  // noise
  const noise = document.createElement("canvas");
  noise.width = c.width;
  noise.height = c.height;
  const nctx = noise.getContext("2d");
  const noiseData = nctx.createImageData(c.width, c.height);
  for(let i=0;i<noiseData.data.length;i+=4){
    const v = Math.random()*40;
    noiseData.data[i]=v;
    noiseData.data[i+1]=v;
    noiseData.data[i+2]=v;
    noiseData.data[i+3]=35;
  }
  nctx.putImageData(noiseData,0,0);
  ctx.globalAlpha = 0.14;
  ctx.drawImage(noise,0,0);
  ctx.globalAlpha = 1;

  drawTrack();

  const fade = ctx.createLinearGradient(0,0,c.width,0);
  fade.addColorStop(0,"rgba(0,0,0,0.40)");
  fade.addColorStop(0.08,"rgba(0,0,0,0)");
  fade.addColorStop(0.92,"rgba(0,0,0,0)");
  fade.addColorStop(1,"rgba(0,0,0,0.40)");
  ctx.fillStyle = fade;
  ctx.fillRect(0,0,c.width,c.height);
}

function drawTrack(){
  if(!data.pts) return;
  const c = shareMap;
  const ctx = c.getContext("2d");

  const norm = normalize(data.pts);

  ctx.beginPath();
  norm.forEach((p,i)=>{
    const x = p[0]*c.width;
    const y = c.height - p[1]*c.height;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });

  ctx.strokeStyle = wditColor(data.WDIT);
  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.stroke();
}



// =====================================================
// ALTIMETRIA
// =====================================================
function drawElevProfile(elev){
  const c = shareElev;
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);
  if(!elev || !elev.length) return;

  const W = c.width;
  const H = c.height;

  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"rgba(15,15,15,0.60)");
  bg.addColorStop(1,"rgba(20,20,20,0.40)");
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  const max = Math.max(...elev);
  const min = Math.min(...elev);
  const padTop = H*0.12;
  const span = (max-min)||1;
  const lineColor = wditColor(data.WDIT);

  ctx.beginPath();
  for(let i=0;i<elev.length;i++){
    const x = (i/(elev.length-1))*W;
    const norm = (elev[i]-min)/span;
    const y = H - (norm*(H-padTop));
    if(i===0) ctx.moveTo(x,H);
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fillStyle = lineColor+"33";
  ctx.fill();

  ctx.beginPath();
  for(let i=0;i<elev.length;i++){
    const x = (i/(elev.length-1))*W;
    const norm = (elev[i]-min)/span;
    const y = H - (norm*(H-padTop));
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.stroke();

  const fade = ctx.createLinearGradient(0,0,W,0);
  fade.addColorStop(0,"rgba(0,0,0,0.45)");
  fade.addColorStop(0.08,"rgba(0,0,0,0)");
  fade.addColorStop(0.92,"rgba(0,0,0,0)");
  fade.addColorStop(1,"rgba(0,0,0,0.45)");
  ctx.fillStyle = fade;
  ctx.fillRect(0,0,W,H);
}

drawMap();
if(data.elev) drawElevProfile(data.elev);


btnDownload.addEventListener("click", async () => {
    const card = shareCard;
    const oldRadius = card.style.borderRadius;
    card.style.borderRadius = "0px";

    const resultCanvas = await html2canvas(card, { scale: 2 });
    card.style.borderRadius = oldRadius;

    resultCanvas.toBlob(async blob => {
        const file = new File([blob], "wiztrail.png", { type: "image/png" });

        // 🔥 FIX: rimosso navigator.canShare({files})
        if (navigator.share) {
            try {
                await navigator.share({
                    title: "Il mio allenamento",
                    files: [file]
                });
                return; // se condiviso, fine
            } catch (e) {
                // se l’utente annulla → si passa al fallback
            }
        }

        // fallback desktop o mobile non compatibile
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "wiztrail.png";
        a.click();
    });
});


// =====================================================
// QR CODE (REAL)
// =====================================================
/* Codice QR completo e funzionante */
class QR8bit{
  constructor(d){this.data=d;}
  getLength(){return this.data.length;}
  write(b){for(let i=0;i<this.data.length;i++) b.put(this.data.charCodeAt(i),8);}
}
const QRMath_EXP=[];
const QRMath_LOG=[];
for(let i=0;i<8;i++) QRMath_EXP[i]=1<<i;
for(let i=8;i<256;i++)
  QRMath_EXP[i]=QRMath_EXP[i-4]^QRMath_EXP[i-5]^QRMath_EXP[i-6]^QRMath_EXP[i-8];
for(let i=0;i<255;i++) QRMath_LOG[QRMath_EXP[i]]=i;
function QRMath_gexp(n){while(n>=256)n-=255;return QRMath_EXP[n];}
function QRMath_glog(n){return QRMath_LOG[n];}

function QRPolynomial(num,shift){
  let off=0;while(off<num.length&&num[off]==0) off++;
  this.num=new Array(num.length-off+shift);
  for(let i=0;i<num.length-off;i++) this.num[i]=num[i+off];
}
QRPolynomial.prototype={
  get(i){return this.num[i]},
  getLength(){return this.num.length},
  multiply(e){
    let n=new Array(this.getLength()+e.getLength()-1).fill(0);
    for(let i=0;i<this.getLength();i++){
      for(let j=0;j<e.getLength();j++)
        n[i+j]^=QRMath_gexp(QRMath_glog(this.get(i))+QRMath_glog(e.get(j)));
    }
    return new QRPolynomial(n,0);
  },
  mod(e){
    if(this.getLength()-e.getLength()<0) return this;
    let ratio=QRMath_glog(this.get(0))-QRMath_glog(e.get(0));
    let n=this.num.slice();
    for(let i=0;i<e.getLength();i++)
      n[i]^=QRMath_gexp(QRMath_glog(e.get(i))+ratio);
    return new QRPolynomial(n,0).mod(e);
  }
};

function QRBitBuffer(){this.buffer=[];this.length=0;}
QRBitBuffer.prototype={
  put(n,l){for(let i=0;i<l;i++) this.putBit(((n>>(l-i-1))&1));},
  get(i){return ((this.buffer[Math.floor(i/8)]>>>(7-i%8))&1)},
  putBit(bit){
    if(this.length%8==0) this.buffer.push(0);
    if(bit) this.buffer[this.buffer.length-1]|=(128>>>(this.length%8));
    this.length++;
  }
};

function QRCode(text){
  this.typeNumber=4;
  this.modules=null;
  this.moduleCount=0;
  this.data=[ new QR8bit(text) ];
  this.make();
}
QRCode.prototype={
  make(){
    this.moduleCount=21;
    this.modules=new Array(this.moduleCount);
    for(let r=0;r<this.moduleCount;r++){
      this.modules[r]=new Array(this.moduleCount).fill(null);
    }
    this.setupFinder(0,0);
    this.setupFinder(14,0);
    this.setupFinder(0,14);
    let data=this.createData();
    this.mapData(data);
  },
  setupFinder(r,c){
    for(let y=-1;y<=7;y++){
      for(let x=-1;x<=7;x++){
        if(r+y<0||r+y>=21||c+x<0||c+x>=21) continue;
        this.modules[r+y][c+x]=(y>=0&&y<=6&&x>=0&&x<=6&&(y==0||y==6||x==0||x==6||(y>=2&&y<=4&&x>=2&&x<=4)));
      }
    }
  },
  createData(){
    const buf=new QRBitBuffer();
    buf.put(4,4);
    buf.put(this.data[0].getLength(),8);
    for(let i=0;i<this.data[0].data.length;i++)
      buf.put(this.data[0].data.charCodeAt(i),8);
    while(buf.length%8!=0) buf.putBit(0);
    const total=19;
    const d=new Array(total).fill(0);
    for(let i=0;i<buf.buffer.length;i++) d[i]=buf.buffer[i];
    return d;
  },
  mapData(data){
    let inc=-1,row=20,bit=0;
    for(let col=20;col>0;col-=2){
      if(col==6) col--;
      for(;;){
        for(let c=0;c<2;c++){
          if(this.modules[row][col-c]===null){
            let dark=false;
            if(bit<data.length*8){
              dark=((data[Math.floor(bit/8)]>>>(7-bit%8))&1)==1;
            }
            this.modules[row][col-c]=dark;
            bit++;
          }
        }
        row+=inc;
        if(row<0||row>=21){row-=inc;inc=-inc;break;}
      }
    }
  },
  draw(canvas,size=300){
    canvas.width=size;
    canvas.height=size;
    const ctx=canvas.getContext("2d");
    const m=21;
    const b=size/m;
    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle="#000";
    for(let r=0;r<m;r++){
      for(let c=0;c<m;c++){
        if(this.modules[r][c]) ctx.fillRect(c*b,r*b,b,b);
      }
    }
  }
};


// =====================================================
// STORIES 1:1 + QR
// =====================================================
btnStories.addEventListener("click", async () => {
    const card = document.getElementById("shareCard");
    const oldRadius = card.style.borderRadius;
    card.style.borderRadius = "0px";

    const canvas = await html2canvas(card, { scale: 2 });
    card.style.borderRadius = oldRadius;

    canvas.toBlob(async blob => {
        const file = new File([blob], "wiztrail_story.png", { type: "image/png" });
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

   // MOBILE: share nativa SOLO se supporta i file
if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
        await navigator.share({
            title: "Il mio allenamento",
            text: "Allenamento su WizTrail – Stories Mode",
            files: [file]
        });
        return;
    } catch (e) {
        // utente annulla → continua al fallback QR
    }
}

        // fallback QR per desktop o mobile non compatibile
        const dataUrl = await new Promise(res => {
            const r = new FileReader();
            r.onloadend = () => res(r.result);
            r.readAsDataURL(blob);
        });

        const qr = new QRCode(dataUrl);
        qr.draw(document.getElementById("qrCanvas"), 300);
        document.getElementById("qrModal").style.display = "flex";
    });
});
</script>

</body>
</html>
