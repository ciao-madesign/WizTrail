<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WizTrail – Share Card</title>

<link rel="stylesheet" href="wiztrail.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Inter,system-ui;
  margin:0;
  padding:0;
}

/* WRAPPER */
.share-wrapper {
  width:100%;
  display:flex;
  justify-content:center;
  padding:20px 0;
}

/* CARD BASE */
#shareCard {
  width:1080px;
  height:1920px;
  position:relative;
  overflow:hidden;

  /* Topo texture */
  background-image:url('img/topo_texture.png');
  background-size:1080px 1920px;
  background-repeat:no-repeat;
  background-position:0 0;
}

/* Overlay nero */
#shareCard::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.70);
  z-index:0;
}

/* CONTENT */
.share-content {
  position:absolute;
  inset:0;
  z-index:2;
  display:flex;
  flex-direction:column;
  padding:48px;
  box-sizing:border-box;
}

/* TITLE */
#shareTitle {
  text-align:center;
  font-size:2.2rem;
  font-weight:800;
  margin-bottom:24px;
  opacity:0.95;
}

/* MAP IMAGE (snapshot Leaflet) */
#shareMapImage {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  filter:grayscale(100%) contrast(1.20) brightness(0.82);
  border-radius:4px;
}

/* LOWER GRID */
.bottom-row {
  margin-top:32px;
  display:flex;
  gap:20px;
  flex:1;
}

.left-col, .right-col {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.wdit-big { font-size:3.6rem; font-weight:900; line-height:1.1; }
.wdit-comment { font-size:1.55rem; }
.perf-comment { font-size:1.25rem; font-weight:600; }
.share-data { font-size:1.2rem; font-weight:600; }

#shareElev {
  width:100%;
  height:300px;
}

/* FOOTER */
.share-footer {
  margin-top:40px;
  text-align:center;
  font-size:1.25rem;
  font-weight:600;
}

/* BUTTONS */
.btn-main {
  display:inline-block;
  padding:14px 26px;
  font-size:1.3rem;
  font-weight:700;
  border:none;
  border-radius:12px;
  background:#00ffcc;
  color:#000;
  cursor:pointer;
  margin-top:18px;
}
.btn-main:hover { opacity:0.85; }

/* QR MODAL */
#qrModal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:99999;
  justify-content:center;
  align-items:center;
}


#hiddenMap {
  pointer-events:none !important;
  visibility:hidden !important;
  filter:none !important;
}

.leaflet-container,
.leaflet-pane,
.leaflet-map-pane,
.leaflet-tile-pane {
  pointer-events:none !important;
}

</style>
</head>

<body>

<!-- HIDDEN LEAFLET MAP (snapshot source) -->
<div id="hiddenMap"></div>

<div class="share-wrapper">
  <div>

    <!-- INPUT -->
    <div style="margin-bottom:16px;">
      <label>Nome allenamento:</label>
      <input id="trainingTitleInput" type="text"
             placeholder="Allenamento"
             style="width:100%;padding:12px;font-size:1.3rem;border-radius:10px;">
    </div>

    <!-- CARD -->
    <div id="shareCard">
      <div class="share-content">

        <div id="shareTitle">Allenamento</div>

        <!-- Replaces the old canvas map -->
        <img id="shareMapImage" src="">

        <div class="bottom-row">

          <div class="left-col">
            <div id="shareWDIT" class="wdit-big"></div>
            <div id="shareComment" class="wdit-comment"></div>
            <div id="sharePerf" class="perf-comment"></div>
          </div>

          <div class="right-col">
            <div id="sDistance" class="share-data"></div>
            <div id="sDplus"   class="share-data"></div>
            <div id="sTimeReal" class="share-data"></div>
            <div id="sTimeEst"  class="share-data" style="display:none;"></div>
            <div id="sPaceAvg"  class="share-data"></div>

            <canvas id="shareElev" width="1080" height="300"></canvas>
          </div>

        </div>

        <div class="share-footer">
          Powered by <strong>WizTrail</strong> • wiztrail.app
        </div>

      </div>
    </div>

    <div style="text-align:center;">
      <button id="btnDownload" class="btn-main">📤 Salva</button>
      <button id="btnStories"  class="btn-main" style="margin-left:10px;">📲 Stories</button>
    </div>

  </div>
</div>

<!-- QR MODAL -->
<div id="qrModal">
  <div style="background:#111;padding:24px;border-radius:12px;text-align:center;">
    <h2>Scansiona con il telefono</h2>
    <canvas id="qrCanvas"></canvas>
    <p style="opacity:0.7;margin-top:10px;font-size:0.95rem;">
      Condividi questa immagine nelle Stories.
    </p>
    <button onclick="qrModal.style.display='none'"
      style="margin-top:18px;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">
      Chiudi
    </button>
  </div>
</div>
<script>

/* ============================================================
   DATA
============================================================ */
const data = JSON.parse(sessionStorage.getItem("shareData") || "{}");

function wditColor(s){
  s=Number(s);
  if(s<0.45) return "#2BB7DA";
  if(s<0.80) return "#34A853";
  if(s<1.20) return "#F4C20D";
  if(s<2.20) return "#F79617";
  if(s<8.00) return "#E91E63";
  return "#8E24AA";
}

/* POPOLA DATI */
sDistance.textContent = `Distanza: ${Number(data.distance).toFixed(2)} km`;
sDplus.textContent    = `Dislivello: ${Math.round(data.dplus)} m`;

if(data.time_real) sTimeReal.textContent = `Tempo reale: ${data.time_real}`;

if(data.time_est && data.includeCompare){
  sTimeEst.style.display="block";
  sTimeEst.textContent  = `Tempo stimato: ${data.time_est}`;
}

if(data.time_real && data.distance){
  let [h,m,s] = data.time_real.split(":").map(Number);
  let sec = h*3600+m*60+s;
  let pace = sec / data.distance;
  sPaceAvg.textContent =
    `Pace medio: ${Math.floor(pace/60)}:${String(Math.round(pace%60)).padStart(2,"0")}/km`;
}

shareWDIT.textContent = `WDIT ${data.WDIT}`;
shareWDIT.style.color = wditColor(data.WDIT);

shareComment.textContent = data.comment || "";

if(data.includeCompare && data.perfComment){
  sharePerf.textContent = data.perfComment;
  sharePerf.style.color = wditColor(data.WDIT);
}

/* TITOLO LIVE */
trainingTitleInput.addEventListener("input",()=>{
  const v = trainingTitleInput.value.trim();
  shareTitle.textContent = v || "Allenamento";
});

/* ============================================================
   LEAFLET HIDDEN MAP → SNAPSHOT PNG
============================================================ */
let map=null, poly=null;

function initHiddenMap(){
  if(map) return;
  map = L.map("hiddenMap", {
    zoomControl:false,
    attributionControl:false
  });

  /* Base chiara → convertita in scala di grigi via CSS filter */
  L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
      { maxZoom:18 }
  ).addTo(map);
}

function renderHiddenMap(){
  if(!data.pts || !data.pts.length) {
    console.warn("Nessuna traccia pts ricevuta");
    return;
  }

  initHiddenMap();

  if (poly) poly.remove();

  poly = L.polyline(
    data.pts.map(p => [p[0], p[1]]),
    { color: wditColor(data.WDIT), weight: 6 }
  ).addTo(map);

  // Fit bounds first
  map.fitBounds(poly.getBounds());

  // Screenshot SOLO quando Leaflet ha caricato tutte le tile
  map.once("load", snapshotMap);
}

function snapshotMap(){
  html2canvas(document.getElementById("hiddenMap"), {scale:1})
    .then(canvas=>{
      shareMapImage.src = canvas.toDataURL();
    });
}

/* avvia rendering */
renderHiddenMap();

/* ============================================================
   ALTIMETRIA
============================================================ */
function drawElevProfile(elev){
  const c=shareElev, ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);
  if(!elev || !elev.length) return;

  const W=c.width, H=c.height;
  const max=Math.max(...elev), min=Math.min(...elev);
  const padTop=H*0.12;
  const span=(max-min)||1;
  const col=wditColor(data.WDIT);

  ctx.beginPath();
  for(let i=0;i<elev.length;i++){
    const x=(i/(elev.length-1))*W;
    const y=H - ((elev[i]-min)/span)*(H-padTop);
    if(i===0) ctx.moveTo(x,H);
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fillStyle=col+"33";
  ctx.fill();

  ctx.beginPath();
  for(let i=0;i<elev.length;i++){
    const x=(i/(elev.length-1))*W;
    const y=H - ((elev[i]-min)/span)*(H-padTop);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=col;
  ctx.lineWidth=3;
  ctx.stroke();
}

if(data.elev) drawElevProfile(data.elev);

/* ============================================================
   QR CODE (versione compatta)
============================================================ */
class QR8bit{
  constructor(d){this.data=d;}
  getLength(){return this.data.length;}
  write(b){for(let i=0;i<this.data.length;i++) b.put(this.data.charCodeAt(i),8);}
}
const QRMath_EXP=[],QRMath_LOG=[];
for(let i=0;i<8;i++) QRMath_EXP[i]=1<<i;
for(let i=8;i<256;i++) QRMath_EXP[i]=QRMath_EXP[i-4]^QRMath_EXP[i-5]^QRMath_EXP[i-6]^QRMath_EXP[i-8];
for(let i=0;i<255;i++) QRMath_LOG[QRMath_EXP[i]]=i;
function QRMath_gexp(n){while(n>=256)n-=255;return QRMath_EXP[n];}
function QRMath_glog(n){return QRMath_LOG[n];}
function QRBitBuffer(){this.buffer=[];this.length=0;}
QRBitBuffer.prototype={
  put(n,l){for(let i=0;i<l;i++) this.putBit((n>>(l-i-1))&1);},
  putBit(b){
    if(this.length%8==0) this.buffer.push(0);
    if(b) this.buffer[this.buffer.length-1]|=(128>>(this.length%8));
    this.length++;
  }
};
function QRCode(text){
  this.typeNumber=4;
  this.modules=null;
  this.moduleCount=21;
  this.data=[ new QR8bit(text) ];
  this.make();
}
QRCode.prototype={
  make(){
    this.modules=new Array(this.moduleCount);
    for(let r=0;r<this.moduleCount;r++)
      this.modules[r]=new Array(this.moduleCount).fill(null);

    this.setupFinder(0,0);
    this.setupFinder(14,0);
    this.setupFinder(0,14);

    let data=this.createData();
    this.mapData(data);
  },
  setupFinder(r,c){
    for(let y=-1;y<=7;y++){
      for(let x=-1;x<=7;x++){
        if(r+y<0||r+y>=21||c+x<0||c+x>=21) continue;
        this.modules[r+y][c+x] =
          (y>=0&&y<=6&&x>=0&&x<=6&&(y==0||y==6||x==0||x==6||(y>=2&&y<=4&&x>=2&&x<=4)));
      }
    }
  },
  createData(){
    const buf=new QRBitBuffer();
    buf.put(4,4);
    buf.put(this.data[0].getLength(),8);
    for(let i=0;i<this.data[0].data.length;i++)
      buf.put(this.data[0].data.charCodeAt(i),8);
    while(buf.length%8!=0) buf.putBit(0);
    const d=new Array(19).fill(0);
    for(let i=0;i<buf.buffer.length&&i<19;i++) d[i]=buf.buffer[i];
    return d;
  },
  mapData(data){
    let inc=-1,row=20,bit=0;
    for(let col=20;col>0;col-=2){
      if(col==6) col--;
      for(;;){
        for(let c=0;c<2;c++){
          if(this.modules[row][col-c]===null){
            let dark=false;
            if(bit<data.length*8)
              dark=((data[Math.floor(bit/8)]>>(7-bit%8))&1)==1;
            this.modules[row][col-c]=dark;
            bit++;
          }
        }
        row+=inc;
        if(row<0||row>=21){row-=inc;inc=-inc;break;}
      }
    }
  },
  draw(canvas,size=300){
    canvas.width=size;
    canvas.height=size;
    const ctx=canvas.getContext("2d");
    const b=size/21;
    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle="#000";
    for(let r=0;r<21;r++){
      for(let c=0;c<21;c++){
        if(this.modules[r][c]) ctx.fillRect(c*b,r*b,b,b);
      }
    }
  }
};

/* ============================================================
   DOWNLOAD + STORIES SHARE
============================================================ */
btnDownload.addEventListener("click", async ()=>{
  const canvas = await html2canvas(shareCard,{scale:1});
  canvas.toBlob(blob=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="wiztrail.png";
    a.click();
  });
});

btnStories.addEventListener("click", async ()=>{

  const canvas = await html2canvas(shareCard,{scale:1});

  canvas.toBlob(async blob=>{
    const file=new File([blob],"wiztrail_story.png",{type:"image/png"});
    const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile && navigator.share){
      try{
        await navigator.share({
          title:"Allenamento",
          text:"Allenamento su WizTrail – Stories Mode",
          files:[file]
        });
        return;
      }catch(e){}
    }

    const reader=new FileReader();
    reader.onloadend=()=>{
      const dataUrl=reader.result;
      const qr=new QRCode(dataUrl);
      qr.draw(document.getElementById("qrCanvas"),300);
      qrModal.style.display="flex";
    };
    reader.readAsDataURL(blob);
  });

});
</script>

</body>
</html>
