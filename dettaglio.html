<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WizTrail – Dettaglio Gara</title>

  <!-- PWA -->
  <link rel="manifest" href="/WizTrail/manifest.webmanifest">
  <meta name="theme-color" content="#002b2b">

  <!-- iOS PWA -->
  <link rel="apple-touch-icon" href="/WizTrail/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WizTrail">

  <!-- Leaflet -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin="">

  <!-- WizTrail CSS -->
  <link rel="stylesheet" href="wiztrail.css">
</head>

<body data-theme="dark">

<header class="app-header">
  <div class="app-brand">
    <img src="img/logo.svg" alt="WizTrail" class="brand-img">
    <span class="brand-name">WizTrail</span>
  </div>
</header>
<div id="wizBanner" class="wiz-banner">
  <a href="install.html" class="wiz-banner-link">
    📱 Aggiungi WizTrail alla Home!
  </a>
</div>


<div class="wrap">

  <h1>
    <span>Dettaglio Gara</span>
    <span class="theme-ctrl">
      <label class="mini">Tema</label>
      <select id="themeSel">
        <option value="dark" selected>Scuro</option>
        <option value="light">Chiaro</option>
      </select>
    </span>
  </h1>


  <button class="btn secondary" onclick="location.href='ranking.html'">
    ← Torna alla classifica
  </button>

  <!-- CARD DATI GARA -->
  <div class="card" id="raceCard">
    <h2 id="raceName">—</h2>

    <div class="grid grid-3">
      <div>
        <h3>Distanza</h3>
        <div class="val" id="raceDist">— km</div>
      </div>
      <div>
        <h3>D+</h3>
        <div class="val" id="raceDplus">— m</div>
      </div>
      <div>
        <h3>WDI</h3>
        <div class="val" id="raceWdi"
             style="font-size:2.4rem; font-weight:900;">—</div>
      </div>
    </div>

    <div id="raceBadge" style="margin-top:10px;"></div>
  </div>

  <!-- MAPPA -->
  <div class="card">
    <h2>Mappa del percorso</h2>
    <div id="map" style="width:100%;height:280px;border-radius:8px;"></div>
  </div>

  <!-- ALTIMETRIA -->
  <div class="card">
    <h2>Profilo altimetrico</h2>
    <canvas id="elevCanvas" width="600" height="200"
            style="width:100%;height:200px;border-radius:8px;"></canvas>
  </div>

  <div class="footer">WizTrail © 2026</div>

</div>

<!-- LEAFLET SCRIPT -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
/* =======================================================
   1) Tema
======================================================= */
document.getElementById("themeSel").addEventListener("change", e => {
  document.body.setAttribute("data-theme", e.target.value);
});

/* =======================================================
   2) Dataset identico a ranking.html
======================================================= */
const races = {
  "Zegama-Aizkorri":        { dist: 42,   dplus: 2900, wdi: 1.48, model:"B", lat:43.0, lon:-2.3 },
  "Dolomites Skyrace":      { dist: 22,   dplus: 1750, wdi: 1.32, model:"A", lat:46.5, lon:11.8 },
  "VUT35 – Valmalenco":     { dist: 34.4, dplus: 2080, wdi: 1.18, model:"B", lat:46.27,lon:9.86 },
  "UTMB OCC":               { dist: 55,   dplus: 3500, wdi: 1.30, model:"C", lat:46.0, lon:7.0 },
  "UTMB CCC":               { dist:100,   dplus:6100,  wdi: 1.52, model:"D", lat:46.0, lon:7.0 },
  "UTMB 100M":              { dist:170,   dplus:10000, wdi: 1.80, model:"E", lat:46.0, lon:7.0 },
  "Lavaredo 50K":           { dist:50,    dplus:2600,  wdi: 1.20, model:"B", lat:46.6, lon:12.0 },
  "Cortina Trail 20K":      { dist:20,    dplus:1000,  wdi: 1.10, model:"A", lat:46.5, lon:12.1 },
  "Sierre-Zinal":           { dist:31,    dplus:2200,  wdi: 1.12, model:"B", lat:46.1, lon:7.6 }
};

/* =======================================================
   3) Leggi parametro ?race=
======================================================= */
const params = new URLSearchParams(window.location.search);
const raceKey = params.get("race");
const race = races[raceKey];

if (!race) {
  document.getElementById("raceName").textContent = "Gara non trovata";
} else {
  document.getElementById("raceName").textContent  = raceKey;
  document.getElementById("raceDist").textContent  = race.dist + " km";
  document.getElementById("raceDplus").textContent = race.dplus + " m";
  document.getElementById("raceWdi").textContent   = race.wdi.toFixed(2);

  const color = getWdiColor(race.wdi);
  document.getElementById("raceWdi").style.color = color;

  document.getElementById("raceBadge").innerHTML = `
    <div style="
      background:${color};
      color:#021;
      padding:6px 16px;
      border-radius:18px;
      display:inline-block;
      font-weight:700;
      margin-top:8px;
    ">
     Classe WDI: ${race.model}
    </div>`;
}

/* =======================================================
   4) Colori WDI
======================================================= */
function getWdiColor(wdi) {
  if (wdi < 1.25) return "#4fd1c5";   // Base
  if (wdi < 1.45) return "#ffb020";   // Intermedio
  if (wdi < 1.70) return "#ff6a3d";   // Avanzato
  return "#ff00a8";                   // Elite
}

/* =======================================================
   5) Mappa Topo-Dark
======================================================= */
let map = L.map("map");

const baseDark = L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  { subdomains:"abcd", maxZoom:19 }
);

const topoOverlay = L.tileLayer(
  "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
  { opacity:0.35, maxZoom:17 }
);

L.layerGroup([baseDark, topoOverlay]).addTo(map);
map.setView([race.lat, race.lon], 11);

/* =======================================================
   6) Grafico altimetrico (placeholder scientifico)
======================================================= */
const canvas = document.getElementById("elevCanvas");
const ctx     = canvas.getContext("2d");

function drawFakeProfile() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "#4fd1c5";
  ctx.lineWidth = 2;
  ctx.beginPath();

  for (let x=0; x<600; x++) {
    const t = x / 600;
    const y = 100 
            - Math.sin(t * Math.PI) * (race.dplus / 10000 * 90) 
            + (Math.sin(t*8)*5);
    ctx.lineTo(x, y);
  }

  ctx.stroke();
}

drawFakeProfile();
</script>

</body>
</html>
