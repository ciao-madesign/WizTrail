<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Autenticazione Strava → WizTrail</title>
</head>
<body style="font-family:system-ui;padding:20px;">

<h2>Connessione a Strava…</h2>

<script>
const params = new URLSearchParams(location.search);
const code = params.get("code");

if (!code) {
  document.body.innerHTML += "<p>Errore: parametro code mancante.</p>";
}

async function exchange() {
  try {
    const res = await fetch(`/api/strava/exchange?code=${code}`);
    const data = await res.json();

    if (data.access_token) {
      localStorage.setItem("strava_token", data.access_token);
      location.href = "import_strava.html";
    } else {
      document.body.innerHTML += "<p>Errore autenticazione.</p>";
    }
  } catch (err) {
    document.body.innerHTML += "<p>Errore server.</p>";
  }
}

exchange();
</script>

</body>
</html>
